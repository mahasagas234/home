// ========================================================
// 日志记录函数
// ========================================================
function 记录日志($消息类型, $原因, $访问者IP, $浏览器代理, $用户哈希, $发送哈希值)
{
    $当前时间戳 = date("Y-m-d H:i:s");
    $日志文件路径 = "log.txt";
    
    $日志条目 = "Date: " . $当前时间戳 .
                " | Type: " . $消息类型 .
                " | Status: blocked" .
                " | Reason: " . $原因 .
                " | IP: " . $访问者IP .
                " | UA: " . $浏览器代理 .
                " | User Hash: " . $用户哈希 .
                " | Sent Hash: (Token: " . $发送哈希值[0] .
                " / Cookie: " . $发送哈希值[1] . ")";
    
    if (file_exists($日志文件路径) && is_writable($日志文件路径)) {
        $文件句柄 = fopen($日志文件路径, "a");
        if ($文件句柄 !== false) {
            fwrite($文件句柄, $日志条目 . "\r\n");
            fclose($文件句柄);
        }
    } else {
        $创建文件 = fopen($日志文件路径, "w");
        if ($创建文件 !== false) {
            fclose($创建文件);
        }
    }
}
