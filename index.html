// 禁用错误在页面上的显示（生产环境风格）

// 设置错误报告级别：报告所有错误，但排除提示和警告

// 发送强力的无缓存头部，防止浏览器缓存此页面

// ========================================================
// 日志记录函数 - 用于记录被阻止或可疑活动
// ========================================================

/**
 * 日志记录函数
 * 将可疑活动记录到 log.txt 文件中
 *
 * @param string $消息类型     日志事件的类型
 * @param string $原因         被阻止或记录的原因
 * @param string $IP地址       访问者的IP地址
 * @param string $用户代理     浏览器的User-Agent字符串
 * @param string $用户哈希     用户的哈希标识
 * @param array  $发送哈希值   包含Token和Cookie的数组
 */
function logData($消息类型, $原因, $IP地址, $用户代理, $用户哈希, $发送哈希值)
{
    // 获取当前时间戳（年-月-日 时:分:秒格式）
    $当前时间戳 = date("Y-m-d H:i:s");
    
    // 定义日志文件名
    $日志文件路径 = "log.txt";
    
    // 构建完整的日志条目字符串
    $日志条目 = "Date: " . $当前时间戳 .
                " | Type: " . $消息类型 .
                " | Status: blocked" .
                " | Reason: " . $原因 .
                " | IP: " . $IP地址 .
                " | UA: " . $用户代理 .
                " | User Hash: " . $用户哈希 .
                " | Sent Hash: (Token: " . $发送哈希值[0] .
                " / Cookie: " . $发送哈希值[1] . ")";
    
    // 检查日志文件是否存在并且可写
    if (file_exists($日志文件路径) && is_writable($日志文件路径)) {
        // 以追加模式打开文件
        $文件句柄 = fopen($日志文件路径, "a");
        
        if ($文件句柄 !== false) {
            // 写入日志条目，使用Windows风格换行
            fwrite($文件句柄, $日志条目 . "\r\n");
            // 正确关闭文件句柄
            fclose($文件句柄);
        }
    } else {
        // 如果文件不存在或不可写，尝试创建空文件
        $创建文件 = fopen($日志文件路径, "w");
        if ($创建文件 !== false) {
            fclose($创建文件);
        }
    }
}
