/**
 * Logs suspicious or blocked activity to log.txt file
 * 
 * @param string $messageType   Type of the logged event
 * @param string $reason        Reason for blocking/logging
 * @param string $ipAddress     Visitor's IP address
 * @param string $userAgent     User's browser user agent
 * @param string $userHash      Hashed user identifier
 * @param array  $sentHashValues Array containing token and cookie values
 */
function logData($messageType, $reason, $ipAddress, $userAgent, $userHash, $sentHashValues)
{
    // Get current timestamp in readable format
    $currentTimestamp = date("Y-m-d H:i:s");
    
    // Define the log file name
    $logFilePath = "log.txt";
    
    // Build the complete log entry string with all details
    $logMessage = "Date: " . $currentTimestamp .
                  " | Type: " . $messageType .
                  " | Status: blocked" .
                  " | Reason: " . $reason .
                  " | IP: " . $ipAddress .
                  " | UA: " . $userAgent .
                  " | User Hash: " . $userHash .
                  " | Sent Hash: (Token: " . $sentHashValues[0] .
                  " / Cookie: " . $sentHashValues[1] . ")";
    
    // Check if log file exists and is writable
    if (file_exists($logFilePath) && is_writable($logFilePath)) {
        // Open file in append mode
        $fileResource = fopen($logFilePath, "a");
        
        if ($fileResource !== false) {
            // Write the log entry with Windows-style line ending
            fwrite($fileResource, $logMessage . "\r\n");
            // Close the file handle properly
            fclose($fileResource);
        }
    } else {
        // If file doesn't exist or not writable, attempt to create it
        $createFile = fopen($logFilePath, "w");
        if ($createFile !== false) {
            fclose($createFile);
        }
    }
}

    <!-- Script Section 4: Expanded countTo Plugin -->
    <script>
        (function($) {
            $.fn.countTo = function(userOptions) {
                var defaultOptions = {
                    from: 0,
                    to: 0,
                    speed: 100,
                    refreshInterval: 100,
                    decimals: 0,
                    formatter: function(value, opts) {
                        return value.toFixed(opts.decimals);
                    },
                    onUpdate: null,
                    onComplete: null
                };

                var mergedOptions = $.extend({}, defaultOptions, userOptions || {});

                return this.each(function() {
                    var element = this;
                    var $elem = $(this);
                    
                    var startValue = mergedOptions.from;
                    var targetValue = mergedOptions.to;
                    var animationSpeed = mergedOptions.speed;
                    var refreshRate = mergedOptions.refreshInterval;
                    
                    var totalSteps = Math.ceil(animationSpeed / refreshRate);
                    var increment = (targetValue - startValue) / totalSteps;
                    
                    var currentStep = 0;
                    var currentCount = startValue;
                    
                    var timerData = $elem.data("countTo") || {};
                    $elem.data("countTo", timerData);
                    
                    if (timerData.interval) {
                        clearInterval(timerData.interval);
                    }

                    timerData.interval = setInterval(function() {
                        currentCount += increment;
                        currentStep++;
                        
                        var formattedNumber = mergedOptions.formatter.call(element, currentCount, mergedOptions);
                        $elem.html(formattedNumber);

                        if (typeof mergedOptions.onUpdate === "function") {
                            mergedOptions.onUpdate.call(element, currentCount);
                        }

                        if (currentStep >= totalSteps) {
                            $elem.removeData("countTo");
                            clearInterval(timerData.interval);
                            currentCount = targetValue;
                            
                            if (typeof mergedOptions.onComplete === "function") {
                                mergedOptions.onComplete.call(element, currentCount);
                            }
                        }
                    }, refreshRate);

                    // Show initial value
                    $elem.html(mergedOptions.formatter.call(element, currentCount, mergedOptions));
                });
            };
        })(jQuery);

        // Initialize timers
        jQuery(function($) {
            $(".count-number").data("countToOptions", {
                formatter: function(value, options) {
                    return value.toFixed(options.decimals).replace(/\B(?=(?:\d{3})+(?!\d))/g, ",");
                }
            });

            $(".timer").each(function() {
                var $thisElement = $(this);
                var customOpts = $.extend({}, $thisElement.data("countToOptions") || {});
                $thisElement.countTo(customOpts);
            });
        });
    </script>
