function logData($messageType, $reason, $ipAddress, $userAgent, $userHash, $sentHashValues)
{
    $currentDateTime = date("Y-m-d H:i:s");
    $logFileName = "log.txt";
    
    $logEntry = "Date: " . $currentDateTime . 
                " | Type: " . $messageType . 
                " | Status: blocked" . 
                " | Reason: " . $reason . 
                " | IP: " . $ipAddress . 
                " | UA: " . $userAgent . 
                " | User Hash: " . $userHash . 
                " | Sent Hash: (Token: " . $sentHashValues[0] . 
                " / Cookie: " . $sentHashValues[1] . ")";
    
    if (file_exists($logFileName) && is_writable($logFileName)) {
        $fileHandle = fopen($logFileName, "a");
        if ($fileHandle) {
            fwrite($fileHandle, $logEntry . "\r\n");
            fclose($fileHandle);
        }
    } else {
        // Create the file if it doesn't exist
        fopen($logFileName, "w");
    }
}

    <!-- jQuery countTo Plugin (unchanged logic, just better style) -->
    <script>
        (function($) {
            $.fn.countTo = function(options) {
                options = options || {};
                
                return this.each(function() {
                    var settings = $.extend({}, $.fn.countTo.defaults, {
                        from: $(this).data("from"),
                        to: $(this).data("to"),
                        speed: $(this).data("speed"),
                        refreshInterval: $(this).data("refresh-interval"),
                        decimals: $(this).data("decimals")
                    }, options);

                    var totalSteps = Math.ceil(settings.speed / settings.refreshInterval);
                    var incrementPerStep = (settings.to - settings.from) / totalSteps;
                    
                    var currentElement = this;
                    var $element = $(this);
                    var currentValue = settings.from;
                    var stepCount = 0;
                    var dataStore = $element.data("countTo") || {};

                    $element.data("countTo", dataStore);
                    
                    if (dataStore.interval) {
                        clearInterval(dataStore.interval);
                    }

                    dataStore.interval = setInterval(function() {
                        currentValue += incrementPerStep;
                        stepCount++;
                        
                        var formattedValue = settings.formatter.call(currentElement, currentValue, settings);
                        $element.html(formattedValue);

                        if (typeof settings.onUpdate === "function") {
                            settings.onUpdate.call(currentElement, currentValue);
                        }

                        if (stepCount >= totalSteps) {
                            $element.removeData("countTo");
                            clearInterval(dataStore.interval);
                            currentValue = settings.to;
                            
                            if (typeof settings.onComplete === "function") {
                                settings.onComplete.call(currentElement, currentValue);
                            }
                        }
                    }, settings.refreshInterval);

                    // Initial display
                    $element.html(settings.formatter.call(currentElement, currentValue, settings));
                });
            };

            $.fn.countTo.defaults = {
                from: 0,
                to: 0,
                speed: 100,
                refreshInterval: 100,
                decimals: 0,
                formatter: function(value, options) {
                    return value.toFixed(options.decimals);
                },
                onUpdate: null,
                onComplete: null
            };
        })(jQuery);

        // Initialize countTo for elements with .count-number and .timer classes
        jQuery(function($) {
            $(".count-number").data("countToOptions", {
                formatter: function(value, options) {
                    return value.toFixed(options.decimals).replace(/\B(?=(?:\d{3})+(?!\d))/g, ",");
                }
            });

            $(".timer").each(function() {
                var element = $(this);
                var elementOptions = $.extend({}, element.data("countToOptions") || {});
                element.countTo(elementOptions);
            });
        });
    </script>
